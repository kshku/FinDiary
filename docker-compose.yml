services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: findiary
      POSTGRES_PASSWORD: findiary_dev
      POSTGRES_DB: findiary
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U findiary"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: migrate/migrate
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/migrations:/migrations
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://findiary:findiary_dev@postgres:5432/findiary?sslmode=disable",
        "up",
      ]

  backend:
    build: ./backend
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "9090:9090"
    environment:
      DB_PASSWORD: findiary_dev
      JWT_SECRET: dev-secret-change-in-production
    volumes:
      - ./backend/config.yaml:/app/config.yaml

volumes:
  pgdata:
